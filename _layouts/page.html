---
layout: default
---

<article>
	<div class="center">
		<h1 class="title">{{ page.title }}</h1>
	</div>

	<div class="divider"></div>
	{% assign page_body = content | strip_html | strip %}
	{% if page_body == "" %}
	<section class="media-empty-state" role="note" aria-label="Sin contenido">
		<div class="media-empty-emoji" aria-hidden="true">🕳️</div>
		<p class="media-empty-text">nope, aquí no hay nada</p>
	</section>
	{% else %}
		{{ content }}
	{% endif %}
</article>
