<aside class="logo">

	{% if page.url == '/index.html' or page.url == '/' %}
		{% assign link = '/' %}
		{% assign prompt = 'Back to Index' %}
	{% else %}
		{% assign link = '/' %}
		{% assign prompt = 'Back to Index' %}
	{% endif %}

	<a href="{{ link | prepend: site.baseurl | prepend: site.url }}">
		<img src="{{ site.logo_url }}" class="logo-avatar">
	</a>
	<span class="logo-prompt code">{{ prompt }}</span>

	<nav class="home-menu" aria-label="Menú de inicio">
		<ul>
			<li><a href="{{ '/entradas' | relative_url }}">Entradas</a></li>
			<li><a href="{{ '/pensamientos' | relative_url }}">Pensamientos</a></li>
			<li><a href="{{ '/pages' | relative_url }}">Páginas</a></li>
		</ul>
	</nav>

</aside>
